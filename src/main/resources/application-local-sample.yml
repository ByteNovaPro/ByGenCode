# 本地开发配置模板
# 复制此文件为 application-local.yml 后填写实际值（application-local.yml 已被 gitignore 忽略）

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lby_ai_code_mother
    username: root
    password: <your-mysql-password>
  data:
    redis:
      host: localhost
      port: 6379
      password: <your-redis-password-if-any>

langchain4j:
  open-ai:
    chat-model:
      api-key: <your-deepseek-api-key>
    streaming-chat-model:
      api-key: <your-deepseek-api-key>
    reasoning-streaming-chat-model:
      api-key: <your-deepseek-api-key>
    routing-chat-model:
      api-key: <your-dashscope-api-key>

cos:
  client:
    host: <your-custom-domain.com>
    secretId: <your-secret-id>
    secretKey: <your-secret-key>
    region: ap-shanghai
    bucket: <your-bucket-name>

pexels:
  api-key: <your-pexels-api-key>

dashscope:
  api-key: <your-dashscope-api-key>
